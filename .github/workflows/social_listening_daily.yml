name: Social Listening — Daily Update

on:
  schedule:
    # 6:00am Mexico City (UTC-6 CST) = 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      fecha_objetivo:
        description: "Fecha a buscar (YYYY-MM-DD). Vacío = ayer."
        required: false
        default: ""

jobs:
  social-listening:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install anthropic

      - name: Run daily social listening
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FECHA_OBJETIVO: ${{ github.event.inputs.fecha_objetivo }}
        run: python run_social_listening_daily.py

      - name: Regenerate analysis cache
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic streamlit pandas openpyxl -q
          python -c "
          import json, sys
          from pathlib import Path
          sys.path.insert(0, '.')
          from analyzer import run_analysis
          from collectors.social_listener import aggregate_insights, get_social_summary_for_llm
          from collectors.bht_loader import load_bht_files, get_bht_summary_for_llm
          mentions = json.loads(Path('outputs/social_listening_cache.json').read_text())
          agg = aggregate_insights(mentions)
          social_summary = get_social_summary_for_llm(agg)
          waves = load_bht_files('data')
          bht_summary = get_bht_summary_for_llm(waves)
          run_analysis(bht_summary=bht_summary, social_summary=social_summary, force_refresh=True)
          print('Análisis regenerado.')
          "

      - name: Commit updated caches
        run: |
          git config user.name  "social-listening-bot"
          git config user.email "bot@kavak-brand.internal"
          git add outputs/social_listening_cache.json outputs/analysis_cache.json
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que commitear."
          else
            DATE=$(date -u +'%Y-%m-%d')
            COUNT=$(python -c "import json; d=json.load(open('outputs/social_listening_cache.json')); print(len(d))")
            git commit -m "chore(data): daily refresh ${DATE} — ${COUNT} menciones · análisis actualizado"
            git push
          fi
